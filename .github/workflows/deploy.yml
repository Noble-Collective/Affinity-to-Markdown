name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'afpub_to_markdown.py'
      - 'main.py'
      - 'pdf_to_markdown.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'static/**'
      - 'templates/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: afpub-converter
          region: us-east1
          source: .
          flags: --memory=2Gi --timeout=300 --execution-environment=gen2
