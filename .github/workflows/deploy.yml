name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Encode SA key for Cloud Run env var
        id: encode_key
        run: echo "b64=$(echo '${{ secrets.GCP_SA_KEY }}' | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: afpub-converter
          region: us-east1
          source: .
          env_vars: |
            GCP_SA_KEY_B64=${{ steps.encode_key.outputs.b64 }}
