name: Build Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.0)'
        required: false
        default: '0.1.0'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: win-pip-${{ hashFiles('windows-installer/requirements.txt') }}
          restore-keys: win-pip-
      - name: Install dependencies
        working-directory: windows-installer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          pip install marker-pdf==1.10.2 pymupdf pyyaml
          pip install google-auth google-genai google-api-core
          pip install certifi regex safetensors huggingface_hub
          pip install "pyinstaller>=6.0"
      - name: Pre-download Marker font
        id: font_win
        shell: bash
        run: |
          python << 'PYEOF'
          import os, marker.util
          from marker.settings import settings
          # Debug: print font-related settings
          for a in sorted(dir(settings)):
              if any(k in a.lower() for k in ['font','static','artifact']):
                  print(f'  settings.{a} = {getattr(settings, a, "?")}')
          # Set FONT_PATH if None
          if not getattr(settings, 'FONT_PATH', None):
              fn = getattr(settings, 'FONT_NAME', 'GoNotoCurrent.ttf') or 'GoNotoCurrent.ttf'
              base = os.path.dirname(os.path.dirname(os.path.abspath(marker.util.__file__)))
              settings.FONT_PATH = os.path.join(base, 'static', fn)
              print(f'Set FONT_PATH = {settings.FONT_PATH}')
          marker.util.download_font()
          print(f'Font exists at {settings.FONT_PATH}: {os.path.exists(settings.FONT_PATH)}')
          PYEOF
      - name: Inject API keys
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        working-directory: windows-installer
        shell: bash
        run: echo "GOOGLE_API_KEY = \"$GOOGLE_API_KEY\"" > _build_secrets.py
      - name: Run PyInstaller
        working-directory: windows-installer
        run: pyinstaller affinity_converter_win.spec --noconfirm
      - name: Copy font into bundle
        working-directory: windows-installer
        shell: bash
        run: |
          FONT=$(python << 'PYEOF'
          import os, marker.util
          from marker.settings import settings
          if not getattr(settings, 'FONT_PATH', None):
              fn = getattr(settings, 'FONT_NAME', 'GoNotoCurrent.ttf') or 'GoNotoCurrent.ttf'
              base = os.path.dirname(os.path.dirname(os.path.abspath(marker.util.__file__)))
              settings.FONT_PATH = os.path.join(base, 'static', fn)
          print(settings.FONT_PATH)
          PYEOF
          )
          BUNDLE="dist/Affinity-PDF-Markdown Converter/_internal/static"
          echo "Copying $FONT -> $BUNDLE"
          mkdir -p "$BUNDLE"
          cp "$FONT" "$BUNDLE/"
          ls -la "$BUNDLE"
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build installer
        working-directory: windows-installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: windows-installer/Output/Affinity-PDF-Markdown-Converter_Setup.exe
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Windows-Portable
          path: windows-installer/dist/Affinity-PDF-Markdown Converter/
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: mac-pip-${{ hashFiles('mac-installer/requirements.txt') }}
          restore-keys: mac-pip-
      - name: Install dependencies
        working-directory: mac-installer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch
          pip install marker-pdf==1.10.2 pymupdf pyyaml
          pip install google-auth google-genai google-api-core
          pip install certifi regex safetensors huggingface_hub
          pip install "pyinstaller>=6.0"
      - name: Pre-download Marker font
        run: |
          python << 'PYEOF'
          import os, marker.util
          from marker.settings import settings
          for a in sorted(dir(settings)):
              if any(k in a.lower() for k in ['font','static','artifact']):
                  print(f'  settings.{a} = {getattr(settings, a, "?")}')
          if not getattr(settings, 'FONT_PATH', None):
              fn = getattr(settings, 'FONT_NAME', 'GoNotoCurrent.ttf') or 'GoNotoCurrent.ttf'
              base = os.path.dirname(os.path.dirname(os.path.abspath(marker.util.__file__)))
              settings.FONT_PATH = os.path.join(base, 'static', fn)
              print(f'Set FONT_PATH = {settings.FONT_PATH}')
          marker.util.download_font()
          print(f'Font exists at {settings.FONT_PATH}: {os.path.exists(settings.FONT_PATH)}')
          PYEOF
      - name: Inject API keys
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        working-directory: mac-installer
        run: echo "GOOGLE_API_KEY = \"$GOOGLE_API_KEY\"" > _build_secrets.py
      - name: Import code signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm certificate.p12
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No signing identity found"
            security find-identity -v "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "Found identity: $IDENTITY"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
      - name: Run PyInstaller
        working-directory: mac-installer
        run: pyinstaller affinity_converter_mac.spec --noconfirm
      - name: Copy font into bundle
        working-directory: mac-installer
        run: |
          FONT=$(python << 'PYEOF'
          import os, marker.util
          from marker.settings import settings
          if not getattr(settings, 'FONT_PATH', None):
              fn = getattr(settings, 'FONT_NAME', 'GoNotoCurrent.ttf') or 'GoNotoCurrent.ttf'
              base = os.path.dirname(os.path.dirname(os.path.abspath(marker.util.__file__)))
              settings.FONT_PATH = os.path.join(base, 'static', fn)
          print(settings.FONT_PATH)
          PYEOF
          )
          BUNDLE="dist/Affinity-PDF-Markdown Converter.app/Contents/Frameworks/static"
          echo "Copying $FONT -> $BUNDLE"
          mkdir -p "$BUNDLE"
          cp "$FONT" "$BUNDLE/"
          ls -la "$BUNDLE"
      - name: Sign the app bundle
        run: |
          APP_PATH="mac-installer/dist/Affinity-PDF-Markdown Converter.app"
          codesign --deep --force --options runtime \
            --sign "$SIGNING_IDENTITY" --timestamp "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
      - name: Create DMG
        working-directory: mac-installer
        run: |
          APP_NAME="Affinity-PDF-Markdown Converter"
          VERSION="${{ github.event.inputs.version }}"
          DMG_DIR="dist/dmg-staging"
          DMG_PATH="dist/Affinity-PDF-Markdown-Converter-${VERSION}.dmg"
          mkdir -p "$DMG_DIR"
          cp -R "dist/${APP_NAME}.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "$APP_NAME" -srcfolder "$DMG_DIR" -ov -format UDZO "$DMG_PATH"
          rm -rf "$DMG_DIR"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp "$DMG_PATH"
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: mac-installer
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DMG_PATH="dist/Affinity-PDF-Markdown-Converter-${VERSION}.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" --wait
          xcrun stapler staple "$DMG_PATH"
      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: macOS-Installer
          path: mac-installer/dist/Affinity-PDF-Markdown-Converter-*.dmg
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: macOS-App-Bundle
          path: mac-installer/dist/Affinity-PDF-Markdown Converter.app/
          retention-days: 30
