# Homestead template styles
# ─────────────────────────────────────────────────────────────────────────────
# TWO TYPES OF ENTRIES:
#
# 1. NAME-KEYED (lines starting with "- name:")
#    Resolved per-file at runtime by scanning the Affinity binary for the
#    style name. Works automatically across all files from this template,
#    even when numeric IDs change between files or Affinity versions.
#
# 2. ID-KEYED (lines starting with "- id:")
#    Traditional numeric-ID mapping. Used as fallback for styles that the
#    auto-resolver cannot identify (blockquotes, verse labels, etc.) and
#    for paragraph-level styles (which have no names in the binary).
#
# When both match the same style, the name-resolved entry wins for new files.
# ─────────────────────────────────────────────────────────────────────────────

styles:

  # ── NAME-KEYED: resolved automatically per file ────────────────────────
  # Set once; works across all Homestead .afpub files forever.

