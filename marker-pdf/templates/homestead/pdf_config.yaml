# Homestead book PDF conversion config
# All size thresholds are expressed as RATIOS relative to body text size.

body_font: auto

headings:
  - weight: regular
    min_ratio: 1.85
    max_ratio: 2.15
    level: 1
  - weight: bold
    min_ratio: 1.85
    max_ratio: 2.15
    level: 3
  - weight: italic
    min_ratio: 1.35
    max_ratio: 1.55
    level: 2
  - weight: bold
    min_ratio: 1.70
    max_ratio: 1.85
    level: 4
  - weight: bold
    min_ratio: 1.35
    max_ratio: 1.55
    level: 4
  - weight: bold
    min_ratio: 1.15
    max_ratio: 1.30
    level: 5

skip_large_ratio: 2.4

running_header_signature:
  - weight: bold
    min_ratio: 1.35
    max_ratio: 1.55
  - weight: bold
    min_ratio: 0.88
    max_ratio: 1.00

quote_max_ratio: 0.88
citation_max_chars: 80

verse_label_signature:
  - weight: bold
    min_ratio: 0.95
    max_ratio: 1.05
  - weight: bold
    min_ratio: 0.62
    max_ratio: 0.75

callout_signature:
  - weight: regular
    min_ratio: 1.55
    max_ratio: 1.65

citation_patterns:
  - '^[A-Z][a-zA-Z]+\s+\d+:\d+[\d\-\u2013\u2014,;:\s]*$'
  - '^[A-Z][a-zA-Z]+\.\s+\d+:\d+[\d\-\u2013\u2014,;:\s]*$'

discussion_question_labels:
  - "##### Searching the Text"
  - "##### Seeking the Truth"
  - "##### Evaluating Our Lives"

discussion_heading_pattern: "Discussion Questions"

skip_line_patterns:
  - '^(Session \d+|Conclusion|Introduction) .+\*\*'
  - '^Further Resources\s+\d+$'
  - '^Stating My Commitments to a Responsible LifeBuilding'

skip_table_markers:
  - 'SEARCHING'

table_to_list:
  - header_contains: "Final Review"
    output_heading: "#### Final Review"

# Front matter corrections: fix formatting issues in title/copyright pages.
# Everything before ends_before is treated as front matter.
front_matter_corrections:
  ends_before: "## Series' Preface"
  remove_lines:
    - 'This rite of passage belongs to'
  text_replacements:
    # Title page: split to line breaks matching the book layout
    - match: "HomeStead: A Rite of Passage into Christian Hearth and Home"
      replace: "HomeStead:\nA Rite of Passage into Christian\nHearth and Home"
    # Publisher info: split to separate lines
    - match: "> York, Pennsylvania Noble Imprint 2026"
      replace: "York, Pennsylvania\nNoble Imprint\n2026"
    # Authors: split to separate bold lines
    - match: "**Matthew R. Lynskey Bryan D. Platania**"
      replace: "**Matthew R. Lynskey**\n**Bryan D. Platania**"
    # Dedication page: format with line breaks matching book layout
    - match: "Noble City Church our family of fellow sojourners and exiles"
      replace: "Noble City Church-\nour family of fellow\nsojourners and exiles"

# Heading hierarchy restructuring: maps font-based levels to semantic levels.
# Runs as final pass after all other heading fixes.
heading_hierarchy:
  front_matter_label: "Front Matter"

  parts:
    - label: "PART ONE: Preparation"
      before_session: "Introduction"
      marker: "PART ONE"
    - label: "PART TWO: Challenge"
      before_session: "Daily Devotionals"
      marker: "PART TWO"
    - label: "PART THREE: Celebration"
      before_session: "Personal Testimony"
      marker: "PART THREE"

  # Maps each H1 heading (in document order) to its H2 session name.
  # null = no session heading (e.g. "Review" stays as H3 within Conclusion).
  session_map:
    - "Series' Preface"       # H1: Passage
    - "Preface"               # H1: HomeStead
    - "Introduction"          # H1: No Longer Two
    - "Session One"           # H1: Under God's Fatherly Care (1st)
    - "Session Two"           # H1: Between the Ages
    - "Session Three"         # H1: Over the Flock
    - "Session Four"          # H1: In the Fear of God
    - "Session Five"          # H1: Under God's Protection
    - "Session Six"           # H1: For the World
    - "Conclusion"            # H1: Under God's Fatherly Care (2nd)
    - ~                       # H1: Review (part of Conclusion)
    - "Daily Devotionals"     # H1: Near to Those Who Call on Him
    - "Outdoor Experiences"   # H1: HomeSteading
    - "Community Building"    # H1: Homes of Holy Testimony
    - "Personal Testimony"    # H1: Bearing Witness
    - "Community Confession"  # H1: We Confess Together
    - "Celebration Ceremony"  # H1: In the Assembly

  trailing_section:
    part_label: "PART FOUR: Journal"
    session_name: "Further Resources"
    subtitle_contains: "Continuing the Parenting Journey"

  # Sub-division labels detected in heading_order (PyMuPDF scan).
  # These appear as H1-level decorative text in the PDF between sessions
  # and are used to insert H3 headings like "### Session 1 Community Study".
  subdivision_labels:
    - "Community Study"
    - "Weekly Disciplines"
    - "Reflective Projects"

  # Rotated sidebar sub-division headings (14pt bold, vertical text).
  # These appear as sideways labels in the PDF margins. Detected by
  # build_rotated_subdivisions and inserted as H3 headings.
  rotated_subdivision_labels:
    - "DAY ONE"
    - "DAY TWO"
    - "OUTDOOR EXPERIENCE ONE"
    - "EXPERIENCE TWO: HEARTH BUILDING"
    - "EXPERIENCE THREE: SHEPHERD'S CARRY"
    - "EXPERIENCE FOUR: TABLE SETTING"
    - "EXPERIENCE FIVE: NIGHT VIGIL"
    - "OUTDOOR EXPERIENCE"
    - "MENTORING SESSION ONE"
    - "MENTORING SESSION TWO"
    - "MENTORING SESSION THREE"
    - "MENTORING SESSION FOUR"
    - "MENTORING SESSION FIVE"
    - "MENTORING SESSION SIX"
    - "GENERAL REFLECTIONS"
    - "PERSONAL TESTIMONY"
    - "COMMUNITY CONFESSION"
    - "CELEBRATION CEREMONY"

  # Manual subdivision overrides for headings not auto-detected.
  # Used when heading_order or rotated text doesn't capture a sub-division.
  subdivision_overrides:
    - session: "Conclusion"
      label: "Conclusion Community Study"
      before_heading: "Tuning Our Hearts to the Lord"
    - session: "Introduction"
      label: "Introduction Orientation and Overview"
      before_heading: "Orientation and Overview"

  # Fix Marker page-break artifacts in merged H4 titles.
  heading_text_fixes:
    - match: "We Confess Together: Stating My Commitments to a Responsible"
      replace: "We Confess Together: Stating My Commitments to a Responsible Life"

  # Artifact headings to remove entirely (Marker page-break junk).
  remove_artifact_headings:
    - "LifeBuilding a Home Devoted to God"
