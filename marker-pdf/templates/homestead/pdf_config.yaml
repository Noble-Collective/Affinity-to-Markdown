# Homestead book PDF conversion config
# All size thresholds are expressed as RATIOS relative to body text size.

body_font: auto

headings:
  - weight: regular
    min_ratio: 1.85
    max_ratio: 2.15
    level: 1
  - weight: bold
    min_ratio: 1.85
    max_ratio: 2.15
    level: 3
  - weight: italic
    min_ratio: 1.35
    max_ratio: 1.55
    level: 2
  - weight: bold
    min_ratio: 1.70
    max_ratio: 1.85
    level: 4
  - weight: bold
    min_ratio: 1.35
    max_ratio: 1.55
    level: 4
  - weight: bold
    min_ratio: 1.15
    max_ratio: 1.30
    level: 5

skip_large_ratio: 2.4

running_header_signature:
  - weight: bold
    min_ratio: 1.35
    max_ratio: 1.55
  - weight: bold
    min_ratio: 0.88
    max_ratio: 1.00

quote_max_ratio: 0.88
citation_max_chars: 80

verse_label_signature:
  - weight: bold
    min_ratio: 0.95
    max_ratio: 1.05
  - weight: bold
    min_ratio: 0.62
    max_ratio: 0.75

callout_signature:
  - weight: regular
    min_ratio: 1.55
    max_ratio: 1.65

citation_patterns:
  - '^[A-Z][a-zA-Z]+\s+\d+:\d+[\d\-\u2013\u2014,;:\s]*$'
  - '^[A-Z][a-zA-Z]+\.\s+\d+:\d+[\d\-\u2013\u2014,;:\s]*$'

# missing_section_headings: removed — now auto-detected by
# fix_missing_headings which compares PDF heading_order against
# Marker output and inserts any headings Marker dropped.

discussion_question_labels:
  - "##### Searching the Text"
  - "##### Seeking the Truth"
  - "##### Evaluating Our Lives"

skip_line_patterns:
  - '^(Session \d+|Conclusion|Introduction) .+\*\*'

skip_table_markers:
  - 'SEARCHING'

table_to_list:
  - header_contains: "Final Review"
    output_heading: "#### Final Review"
