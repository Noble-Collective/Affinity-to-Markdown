  # === Introduction ===

  - id: Home-ParOnePre-Int-IntComStu-SeeGodWis-BibWis-GroDis-1
    type: numbered
    ordinal: 1
    text: "1. How would you describe your Christian faith and walk with the Lord? Would you describe yourself as a person of integrity?"
    path: "PART ONE: Preparation > Introduction > Introduction Community Study > Seeking God's Wisdom > Biblical Wisdom > Group Discussion"

  - id: Home-ParOnePre-Int-IntComStu-SeeGodWis-BibWis-GroDis-2
    type: numbered
    ordinal: 2
    text: "2. Who are people of integrity that you know? What makes them people of integrity? How does integrity lead to blessing on one's children?"
    path: "PART ONE: Preparation > Introduction > Introduction Community Study > Seeking God's Wisdom > Biblical Wisdom > Group Discussion"

  - id: Home-ParOnePre-Int-IntComStu-SeeGodWis-BibWis-GroDis-3
    type: numbered
    ordinal: 3
    text: "3. What hopes and dreams do you have for your children? What are God's desires for your children? Are these aligned?"
    path: "PART ONE: Preparation > Introduction > Introduction Community Study > Seeking God's Wisdom > Biblical Wisdom > Group Discussion"

  - id: Home-ParOnePre-Int-IntComStu-SeeGodWis-BibWis-GroDis-4
