    ordinal: 4
    text: "4. What areas of your life would need to change for you to better parent your children? What would it look like for your children to experience God's blessing?"
    path: "PART ONE: Preparation > Introduction > Introduction Community Study > Seeking God's Wisdom > Biblical Wisdom > Group Discussion"

