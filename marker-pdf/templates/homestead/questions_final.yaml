  - id: Home-ParOnePre-Int-IntComStu-ExpBibTex-DisQue-SeaTex-3
    type: numbered
    ordinal: 3
    text: "3. **God's Promises**: How does this narrative highlight the importance of God's promises being fulfilled in Christ? What does it look like to have a family that is established on God's promises? What role should the gospel have in our parenting?"
